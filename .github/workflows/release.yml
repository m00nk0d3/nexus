name: Release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"      # stable:     v1.2.3
      - "v[0-9]+.[0-9]+.[0-9]+-*"    # pre-release: v1.2.3-alpha.1, v1.2.3-beta.2, v1.2.3-rc.1

permissions:
  contents: write

jobs:
  release:
    name: Goreleaser
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run tests
        run: make test

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
